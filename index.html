    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: rgba(245, 245, 247, 0.85);
            --ui-100: #f5f5f7;
            --ui-200: #e8e8ed;
            --accent: #000000;
            --text: #000000;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --sidebar-width: 300px;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --sidebar-bg: rgba(15, 15, 15, 0.9);
            --ui-100: #1a1a1a;
            --ui-200: #333333;
            --accent: #ffffff;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background: var(--bg); height: 100dvh; overflow: hidden; display: flex; color: var(--text); transition: background 0.5s var(--spring); }

        /* --- SPLASH SCREEN --- */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-logo { width: 100px; height: 100px; color: white; animation: logo-intro 2.5s var(--spring) infinite; }
        @keyframes logo-intro { 0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 50% { transform: scale(1.1); opacity: 1; filter: blur(0); } 100% { transform: scale(1); filter: drop-shadow(0 0 15px white); } }

        /* --- SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-width); height: 100%; background: var(--sidebar-bg); backdrop-filter: blur(30px);
            border-right: 1px solid var(--ui-200); display: flex; flex-direction: column; transition: transform 0.6s var(--spring); z-index: 1000;
        }
        body.sidebar-closed #sidebar { transform: translateX(-100%); position: absolute; }
        
        #history-list { flex: 1; overflow-y: auto; padding: 15px; }
        .history-item { 
            padding: 14px; margin-bottom: 8px; background: var(--bg); border-radius: 14px; 
            font-size: 0.85rem; border: 1px solid var(--ui-100); cursor: pointer;
            display: flex; justify-content: space-between; transition: 0.3s var(--spring);
        }
        .history-item:hover { opacity: 0.8; transform: translateX(5px); }
        .history-item.active { background: var(--accent); color: var(--bg); }

        /* --- BUTTONS & HOVERS --- */
        .icon-btn, .send-btn, .private-btn { transition: opacity 0.3s, transform 0.2s; cursor: pointer; }
        .icon-btn:hover, .send-btn:hover { opacity: 0.7; transform: scale(1.05); }
        .icon-bold { stroke-width: 3px !important; }

        /* --- HEADER --- */
        header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--ui-100); }
        .brand-wrap { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; }

        /* --- PRIVATE BUTTON (Header) --- */
        .private-btn { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 0.9rem; padding: 10px; }

        /* --- SETTINGS OVERLAY --- */
        #settings-overlay {
            position: fixed; inset: 0; background: rgba(var(--bg-rgb), 0.1); 
            backdrop-filter: blur(70px); -webkit-backdrop-filter: blur(70px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: 0.4s ease;
        }
        #settings-overlay.active { display: flex; opacity: 1; }
        .settings-card { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .setting-row { background: var(--ui-100); padding: 18px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; }
        #close-settings { margin-top: 40px; font-size: 2.5rem; cursor: pointer; opacity: 0.6; }

        /* --- CHAT AREA --- */
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 16px 20px; border-radius: 22px; font-size: 0.95rem; line-height: 1.6; animation: msgSlide 0.5s var(--spring) forwards; }
        .msg-user { align-self: flex-end; background: var(--accent); color: var(--bg); border-bottom-right-radius: 4px; }
        .msg-bot { align-self: flex-start; background: var(--ui-100); border-bottom-left-radius: 4px; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(20px); } }

        /* --- INPUT --- */
        .input-wrap { padding: 20px; background: var(--bg); flex-shrink: 0; }
        #file-chip { background: var(--accent); color: var(--bg); padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; margin-bottom: 8px; display: none; animation: msgSlide 0.3s var(--spring); }
        .input-pill { 
            max-width: 800px; margin: 0 auto; background: var(--ui-100); 
            padding: 6px 6px 6px 18px; border-radius: 35px; display: flex; align-items: center; gap: 12px;
        }
        #user-input { flex: 1; border: none; outline: none; background: transparent; color: var(--text); font-size: 1rem; padding: 10px 0; }
        .circle-btn { background: var(--accent); color: var(--bg); border: none; width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; }

        /* Toggle Switches */
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; transform: translateX(-100%); width: 85%; }
            body.sidebar-open #sidebar { transform: translateX(0); }
            .brand-wrap span { display: none; }
        }

    <script>
        const API_KEY = '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';
        const MODEL = 'openai/gpt-oss-120b:free';

        let sessions = JSON.parse(localStorage.getItem('nova_final_v1') || '[]');
        let currentId = null;
        let isPrivate = false;
        let fileObj = null;

        // Splash handling
        window.addEventListener('load', () => {
            setTimeout(() => {
                const s = document.getElementById('splash');
                s.style.opacity = '0';
                setTimeout(() => s.style.display = 'none', 800);
            }, 3000);
        });

        function toggleTheme() {
            const b = document.body;
            const isL = b.getAttribute('data-theme') === 'light';
            b.setAttribute('data-theme', isL ? 'dark' : 'light');
            document.getElementById('moon-icon').style.display = isL ? 'none' : 'block';
            document.getElementById('sun-icon').style.display = isL ? 'block' : 'none';
        }

        function togglePrivate() {
            isPrivate = !isPrivate;
            const btn = document.getElementById('private-toggle-btn');
            if(isPrivate) {
                btn.textContent = "Public Chat";
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('moon-icon').style.display = 'none';
                document.getElementById('sun-icon').style.display = 'block';
                createNewChat();
            } else {
                btn.textContent = "InPrivate Chat";
                document.body.setAttribute('data-theme', 'light');
                document.getElementById('moon-icon').style.display = 'block';
                document.getElementById('sun-icon').style.display = 'none';
                if(sessions.length > 0) loadSession(sessions[0].id);
            }
        }

        function handleMic() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.start();
            document.getElementById('user-input').placeholder = "Listening...";
            recognition.onresult = (event) => {
                document.getElementById('user-input').value = event.results[0][0].transcript;
                document.getElementById('user-input').placeholder = "Message DarkNovaX...";
            };
        }

        function toggleSettings() {
            document.getElementById('settings-overlay').classList.toggle('active');
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-open');
            if(window.innerWidth > 768) document.body.classList.toggle('sidebar-closed');
        }

        function setAccent(color) {
            document.documentElement.style.setProperty('--accent', color);
        }

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                fileObj = { name: file.name, content: ev.target.result };
                const chip = document.getElementById('file-chip');
                chip.style.display = 'block';
                chip.textContent = `📄 ${file.name}`;
            };
            reader.readAsText(file);
        }

        function addMessage(text, role) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
            div.innerHTML = role === 'assistant' ? marked.parse(text) : text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            return div;
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && !fileObj) return;

            if(!isPrivate && !currentId) {
                currentId = Date.now();
                sessions.unshift({ id: currentId, title: text.substring(0,25) || "Session", messages: [] });
            }

            let prompt = text;
            if(fileObj) {
                prompt = `[File: ${fileObj.name}]\n${fileObj.content}\n\n${text}`;
                fileObj = null;
                document.getElementById('file-chip').style.display = 'none';
            }

            addMessage(text || "Processing file...", 'user');
            input.value = "";

            const msgs = isPrivate ? [] : sessions.find(s => s.id === currentId).messages;
            msgs.push({ role: 'user', content: prompt });

            let botDiv = addMessage("Analyzing...", 'assistant');
            let fullText = "";

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODEL, messages: msgs, stream: true })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                botDiv.innerHTML = "";

                while(true) {
                    const { done, value } = await reader.read();
                    if(done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for(const line of lines) {
                        if(line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if(data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                fullText += json.choices[0].delta.content || "";
                                botDiv.innerHTML = marked.parse(fullText);
                                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
                if(!isPrivate) { msgs.push({ role: 'assistant', content: fullText }); save(); renderHistory(); }
            } catch (err) { botDiv.textContent = "Error: System link interrupted."; }
        }

        function createNewChat() {
            currentId = null;
            document.getElementById('chat-window').innerHTML = `<div class="msg msg-bot">DarkNovaX Session Initialized. ${isPrivate ? 'InPrivate mode active.' : ''}</div>`;
            if(window.innerWidth < 768) toggleSidebar();
        }

        function save() { localStorage.setItem('nova_final_v1', JSON.stringify(sessions)); }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = sessions.map(s => `
                <div class="history-item ${s.id === currentId ? 'active' : ''}" onclick="loadSession(${s.id})">
                    <span>${s.title}</span>
                    <span onclick="event.stopPropagation(); deleteSess(${s.id})">&times;</span>
                </div>
            `).join('');
        }

        function loadSession(id) {
            currentId = id;
            const s = sessions.find(x => x.id === id);
            document.getElementById('chat-window').innerHTML = "";
            s.messages.forEach(m => addMessage(m.content, m.role));
            renderHistory();
        }

        function deleteSess(id) {
            sessions = sessions.filter(s => s.id !== id);
            save(); renderHistory();
            if(currentId === id) createNewChat();
        }

        function clearAll() { if(confirm("Wipe all system data?")) { localStorage.clear(); location.reload(); } }
        function onGoogle(r) { toggleSettings(); addMessage("Google Account Linked.", 'bot'); }

        document.getElementById('user-input').addEventListener('keypress', e => e.key === 'Enter' && handleSend());
        renderHistory();
    </script>
</body>
</html>
