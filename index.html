    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: rgba(15, 15, 15, 0.95);
            --ui-100: #1a1a1a;
            --ui-200: #333333;
            --accent: #ffffff;
            --text: #ffffff;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --sidebar-width: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background: var(--bg); height: 100dvh; overflow: hidden; display: flex; color: var(--text); }

        /* --- RESTORED OLD SPLASH SCREEN --- */
        #splash { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.8s; 
        }
        .splash-logo { width: 100px; height: 100px; color: white; animation: logo-intro 2.5s var(--spring) infinite; }
        @keyframes logo-intro { 
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 
            50% { transform: scale(1.1); opacity: 1; filter: blur(0); } 
            100% { transform: scale(1); filter: drop-shadow(0 0 15px white); } 
        }

        /* --- RESTORED OLD SIDEBAR & TRANSPARENCY --- */
        #sidebar {
            width: var(--sidebar-width); height: 100%; background: var(--sidebar-bg); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--ui-200); display: flex; flex-direction: column; 
            transition: transform 0.6s var(--spring); z-index: 1000;
        }
        body.sidebar-closed #sidebar { transform: translateX(-100%); position: absolute; }
        
        #history-list { flex: 1; overflow-y: auto; padding: 15px; }
        .history-item { 
            padding: 14px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border-radius: 14px; 
            font-size: 0.85rem; border: 1px solid var(--ui-100); cursor: pointer;
            display: flex; justify-content: space-between; transition: 0.3s var(--spring);
        }
        .history-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .history-item.active { background: var(--accent); color: var(--bg); }

        /* --- RESTORED OLD WELCOME SCREEN --- */
        #welcome-screen {
            height: 100%; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; gap: 20px; animation: fadeIn 0.6s;
        }
        .welcome-logo { animation: float 4s infinite ease-in-out; margin-bottom: 10px; }
        @keyframes float { 50% { transform: translateY(-10px); } }
        
        .welcome-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px; width: min(450px, 95%);
        }
        .welcome-grid button {
            background: #111; border: 1px solid #2d2d2d; color: white;
            border-radius: 20px; padding: 25px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .welcome-grid button:hover { transform: translateY(-5px); background: #181818; border-color: #444; }
        .welcome-grid svg { opacity: 0.8; }

        /* --- CHAT AREA --- */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { 
            height: 70px; padding: 0 20px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid var(--ui-100);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
        }
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }

        /* Messages */
        .msg { 
            max-width: 85%; padding: 16px 20px; border-radius: 22px; font-size: 0.95rem; 
            line-height: 1.6; animation: msgSlide 0.5s var(--spring) forwards; 
            backdrop-filter: blur(10px);
        }
        .msg-user { align-self: flex-end; background: var(--accent); color: var(--bg); border-bottom-right-radius: 4px; }
        .msg-bot { align-self: flex-start; background: var(--ui-100); border-bottom-left-radius: 4px; border: 1px solid #2d2d2d; }
        
        @keyframes msgSlide { from { opacity: 0; transform: translateY(20px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bold Text Restoration */
        strong, b { font-weight: 800; color: #fff; }
        .msg-user strong, .msg-user b { color: #000; }

        /* --- RESTORED DOT ANIMATION --- */
        .typing { display: flex; align-items: center; gap: 5px; padding: 8px 2px; }
        .typing span { 
            width: 7px; height: 7px; border-radius: 50%; background: currentColor; 
            animation: typingBounce 1.2s infinite ease-in-out; 
        }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0.5); opacity: .3; } 40% { transform: scale(1); opacity: 1; } }

        /* --- INPUT --- */
        .input-wrap { padding: 20px; background: var(--bg); }
        .input-pill { 
            max-width: 800px; margin: 0 auto; background: var(--ui-100); 
            padding: 6px 6px 6px 18px; border-radius: 35px; display: flex; 
            align-items: center; gap: 12px; border: 1px solid #2d2d2d;
        }
        #user-input { flex: 1; border: none; outline: none; background: transparent; color: var(--text); font-size: 1rem; padding: 10px 0; }
        
        .circle-btn { 
            background: var(--accent); color: var(--bg); border: none; width: 44px; height: 44px; 
            border-radius: 50%; display: grid; place-items: center; cursor: pointer; transition: 0.3s;
        }
        .circle-btn:hover { transform: scale(1.05); }

        .icon-btn { background: none; border: none; color: var(--text); cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; }

        /* --- SETTINGS --- */
        #settings-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: 0.4s;
        }
        #settings-overlay.active { display: flex; opacity: 1; }
        .settings-card { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .setting-row { background: var(--ui-100); padding: 18px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2d2d2d; }

        /* Switches */
        .switch { width: 50px; height: 26px; position: relative; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: #333; border-radius: 34px; cursor: pointer; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: #fff; }
        input:checked + .slider:before { transform: translateX(24px); background: #000; }

        #file-chip {
            display: none; background: #222; border: 1px solid #333; color: white;
            padding: 8px 15px; border-radius: 15px; font-size: 0.85rem;
            width: fit-content; margin: 0 auto 10px; animation: msgSlide 0.3s;
        }

        pre { background: #000 !important; border: 1px solid #2d2d2d; padding: 18px; border-radius: 18px; overflow: auto; margin: 15px 0; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 14px; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; transform: translateX(-100%); width: 85%; }
            body.sidebar-open #sidebar { transform: translateX(0); }
            .brand-wrap span { display: none; }
        }
    </style>

        function toggleSidebar() { 
            document.body.classList.toggle('sidebar-open');
            if(window.innerWidth > 768) document.body.classList.toggle('sidebar-closed');
        }

        function toggleSettings() { 
            document.getElementById('settings-overlay').classList.toggle('active'); 
        }

        function togglePrivate() {
            isPrivate = !isPrivate;
            const btn = document.getElementById('private-indicator');
            btn.textContent = isPrivate ? "Public Chat" : "InPrivate Chat";
            btn.style.borderColor = isPrivate ? "#00ff00" : "#444";
            if(isPrivate) createNewChat();
        }

        function setAccent(c) { document.documentElement.style.setProperty('--accent', c); }
        function fillPrompt(t) { document.getElementById('user-input').value = t; }

        function handleFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                fileObj = { name: file.name, content: ev.target.result };
                const chip = document.getElementById('file-chip');
                chip.style.display = 'block';
                chip.textContent = `MOUNTED: ${file.name.toUpperCase()}`;
            };
            reader.readAsText(file);
        }

        function handleMic() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("System voice link not supported.");
            const rec = new Speech();
            const btn = document.getElementById('mic-trigger');
            btn.style.color = "#ff2d55";
            rec.start();
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                btn.style.color = "white";
            };
            rec.onerror = () => { btn.style.color = "white"; };
        }

        function addMessage(text, role) {
            const welcome = document.getElementById('welcome-screen');
            if(welcome) welcome.remove();

            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
            
            if(role === 'assistant') {
                div.innerHTML = marked.parse(text);
                div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            } else {
                div.textContent = text;
            }
            
            win.appendChild(div);
            if(document.getElementById('sett-scroll').checked) win.scrollTop = win.scrollHeight;
            return div;
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && !fileObj) return;

            if(!isPrivate && !currentId) {
                currentId = Date.now();
                sessions.unshift({ id: currentId, title: text.slice(0, 30) || "New Session", messages: [] });
            }

            let prompt = text;
            if(fileObj) {
                prompt = `[FILE: ${fileObj.name}]\n${fileObj.content}\n\nUSER: ${text}`;
                fileObj = null;
                document.getElementById('file-chip').style.display = 'none';
            }

            addMessage(text, 'user');
            input.value = "";

            const msgs = isPrivate ? [] : sessions.find(s => s.id === currentId).messages;
            msgs.push({ role: 'user', content: prompt });

            // RESTORED DOT ANIMATION
            const botDiv = addMessage('', 'assistant');
            botDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${API_KEY}`, 
                        "Content-Type": "application/json",
                        "HTTP-Referer": "https://darknovax.ai"
                    },
                    body: JSON.stringify({ model: MODEL, messages: msgs, stream: true })
                });

                if(!res.ok) {
                    const err = await res.json();
                    botDiv.innerHTML = `<strong>LINK ERROR:</strong> ${err.error.message}`;
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                botDiv.innerHTML = ""; // Clear dots

                while(true) {
                    const { done, value } = await reader.read();
                    if(done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for(const line of lines) {
                        if(line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if(data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const content = json.choices[0].delta.content || "";
                                fullText += content;
                                botDiv.innerHTML = marked.parse(fullText);
                                if(content.includes('\n')) botDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                            } catch(e){}
                        }
                    }
                    if(document.getElementById('sett-scroll').checked) document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                }

                botDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

                if(!isPrivate) {
                    msgs.push({ role: 'assistant', content: fullText });
                    save(); renderHistory();
                }

            } catch (err) {
                botDiv.innerHTML = "<strong>CRITICAL ERROR:</strong> Neural link severed.";
            }
        }

        function createNewChat() {
            currentId = null;
            location.reload(); 
        }

        function save() { localStorage.setItem('nova_legacy_v5', JSON.stringify(sessions)); }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = sessions.map(s => `
                <div class="history-item ${s.id === currentId ? 'active' : ''}" onclick="loadSession(${s.id})">
                    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:80%; font-weight:800;">${s.title.toUpperCase()}</span>
                    <span onclick="event.stopPropagation(); deleteSess(${s.id})">✕</span>
                </div>
            `).join('');
        }

        function loadSession(id) {
            currentId = id;
            const s = sessions.find(x => x.id === id);
            document.getElementById('chat-window').innerHTML = "";
            s.messages.forEach(m => addMessage(m.content, m.role));
            renderHistory();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function deleteSess(id) {
            sessions = sessions.filter(s => s.id !== id);
            save(); renderHistory();
            if(currentId === id) createNewChat();
        }

        function clearAll() { if(confirm("Initiate total memory wipe?")) { localStorage.clear(); location.reload(); } }
        function onGoogle(r) { toggleSettings(); addMessage("Identity Verified via Google Interface.", 'assistant'); }

        document.getElementById('user-input').addEventListener('keypress', e => e.key === 'Enter' && handleSend());
        
        // Drag-Drop Restoration
        document.addEventListener('dragover', e => { e.preventDefault(); document.body.style.opacity = '0.7'; });
        document.addEventListener('drop', e => {
            e.preventDefault();
            document.body.style.opacity = '1';
            const file = e.dataTransfer.files[0];
            if(file) handleFile({ target: { files: [file] } });
        });

        renderHistory();
    </script>
</body>
</html>
